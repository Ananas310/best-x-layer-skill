name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: "Run protected live smoke checks (requires secrets)"
        required: false
        default: false
        type: boolean

jobs:
  test-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Unit tests
        run: npm test
      - name: Offline smoke
        run: npm run smoke

  live-smoke:
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_smoke
    runs-on: ubuntu-latest
    needs: test-and-smoke
    environment: live
    env:
      OKX_ONCHAINOS_API_KEY: ${{ secrets.OKX_ONCHAINOS_API_KEY }}
      OKX_ONCHAINOS_SECRET_KEY: ${{ secrets.OKX_ONCHAINOS_SECRET_KEY }}
      OKX_ONCHAINOS_PASSPHRASE: ${{ secrets.OKX_ONCHAINOS_PASSPHRASE }}
      XLAYER_RPC_URL: ${{ secrets.XLAYER_RPC_URL }}
      ONCHAINOS_BASE_URL: ${{ secrets.ONCHAINOS_BASE_URL }}
      SMOKE_STRICT_LIVE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Live smoke
        run: npm run smoke:live:strict
